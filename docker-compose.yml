services:
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command: >
      zap.sh -daemon
      -host 0.0.0.0
      -port 8080
      -config api.key=${ZAP_API_KEY:-changeme}
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    ports:
      - "${ZAP_PORT:-8080}:8080"
    profiles:
      - zap
